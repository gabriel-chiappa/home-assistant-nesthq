hemma_curtain:
  template: [hemma_entity]

  show_entity_picture: true
  show_icon: false
  show_name: true
  show_state: true
  name: Curtain

  tap_action:
    action: more-info

  hold_action:
    action: toggle

  icon_tap_action:
    action: call-service
    service: |
      [[[
        const s = (entity?.state || '').toLowerCase();
        return ['open', 'opening'].includes(s) ? 'cover.close_cover' : 'cover.open_cover';
      ]]]
    service_data:
      entity_id: '[[[ return entity.entity_id ]]]'

  entity_picture: |
    [[[
      const s = (entity?.state || '').toLowerCase();
      return ['open', 'opening'].includes(s)
        ? '/local/hemma/icons/curtain-open.svg'
        : '/local/hemma/icons/curtain-closed.svg';
    ]]]

  extra_styles: |
    @media (hover: hover) {
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
    @media (hover: none) {
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
