hemma_air_purifier:
  template: [hemma_entity]

  show_icon: true
  show_name: true
  show_state: true

  tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_tap_action:
    action: toggle

  icon_hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  styles:
    entity_picture:
      - width: 100%
      - height: 100%
      - object-fit: contain
      - opacity: 0.8
      - transition: opacity 0.2s ease, filter 0.2s ease, transform 0.15s ease
      - cursor: pointer

    img_cell:
      - background: transparent !important
      - box-shadow: none !important
      - transition: filter 0.2s ease
      - cursor: pointer

  extra_styles: |
    #img-cell { overflow: visible !important; }
    @media (hover: hover) {
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
    @media (hover: none) {
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
