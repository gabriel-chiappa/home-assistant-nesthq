  actions:
  - action: wake_on_lan.send_magic_packet
    data:
      mac: a0:d0:5b:51:6a:7e
  mode: single
- id: debug_bedroom_floor_lamp
  alias: DEBUG - Bedroom Floor Lamp Turned On
  description: Debug automation to capture context when bedroom floor lamp turns on
  triggers:
  - platform: state
    entity_id: light.bedroom_floor_lamp
    to: 'on'
  actions:
  - action: persistent_notification.create
    data:
      title: Bedroom Floor Lamp turned ON
      message: 'Time: {{ now() }}

        Entity: {{ trigger.entity_id }}

        From: {{ trigger.from_state.state if trigger.from_state else ''unknown'' }}

        To: {{ trigger.to_state.state if trigger.to_state else ''unknown'' }}

        Context ID: {{ trigger.to_state.context.id }}

        User ID: {{ trigger.to_state.context.user_id }}

        Parent ID: {{ trigger.to_state.context.parent_id }}

        Brightness: {{ state_attr(''light.bedroom_floor_lamp'', ''brightness'') }}'
  - action: system_log.write
    data:
      level: warning
      logger: debug.bedroom_floor_lamp
      message: Bedroom Floor Lamp ON. context_id={{ trigger.to_state.context.id }},
        user_id={{ trigger.to_state.context.user_id }}, parent_id={{ trigger.to_state.context.parent_id
        }}, brightness={{ state_attr('light.bedroom_floor_lamp', 'brightness') }}
  mode: queued
